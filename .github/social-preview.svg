<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0F172A"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Network visualization (left side) -->
  <g opacity="0.8">
    <!-- Connection lines -->
    <g stroke="url(#grad2)" stroke-width="3" opacity="0.4">
      <line x1="150" y1="150" x2="300" y2="320" />
      <line x1="450" y1="150" x2="300" y2="320" />
      <line x1="150" y1="490" x2="300" y2="320" />
      <line x1="450" y1="490" x2="300" y2="320" />
      <line x1="150" y1="150" x2="450" y2="150" />
      <line x1="150" y1="490" x2="450" y2="490" />
      <line x1="150" y1="150" x2="150" y2="490" />
      <line x1="450" y1="150" x2="450" y2="490" />
      <line x1="150" y1="150" x2="450" y2="490" />
      <line x1="450" y1="150" x2="150" y2="490" />
    </g>

    <!-- Nodes -->
    <circle cx="150" cy="150" r="20" fill="url(#grad2)"/>
    <circle cx="450" cy="150" r="20" fill="url(#grad2)"/>
    <circle cx="150" cy="490" r="20" fill="url(#grad2)"/>
    <circle cx="450" cy="490" r="20" fill="url(#grad2)"/>

    <!-- Central node -->
    <circle cx="300" cy="320" r="32" fill="url(#grad1)"/>
    <circle cx="300" cy="320" r="24" fill="#0F172A"/>
    <circle cx="300" cy="320" r="16" fill="url(#grad1)"/>

    <!-- Highlights -->
    <circle cx="150" cy="150" r="6" fill="white" opacity="0.9"/>
    <circle cx="450" cy="150" r="6" fill="white" opacity="0.9"/>
    <circle cx="150" cy="490" r="6" fill="white" opacity="0.9"/>
    <circle cx="450" cy="490" r="6" fill="white" opacity="0.9"/>
    <circle cx="300" cy="320" r="6" fill="white" opacity="0.9"/>
  </g>

  <!-- Text content -->
  <text x="640" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="84" font-weight="700" fill="white">
    semanticmesh
  </text>

  <text x="640" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94A3B8">
    Map and query dependencies across
  </text>

  <text x="640" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94A3B8">
    microservices, databases, and infrastructure
  </text>

  <!-- Feature badges -->
  <g transform="translate(640, 470)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="url(#grad1)" opacity="0.2"/>
    <text x="90" y="27" font-family="system-ui" font-size="18" font-weight="600" fill="url(#grad1)" text-anchor="middle">
      70-80% Accuracy
    </text>

    <rect x="200" y="0" width="160" height="40" rx="20" fill="url(#grad2)" opacity="0.2"/>
    <text x="280" y="27" font-family="system-ui" font-size="18" font-weight="600" fill="url(#grad2)" text-anchor="middle">
      15 Component Types
    </text>

    <rect x="380" y="0" width="150" height="40" rx="20" fill="url(#grad1)" opacity="0.2"/>
    <text x="455" y="27" font-family="system-ui" font-size="18" font-weight="600" fill="url(#grad1)" text-anchor="middle">
      MCP Integration
    </text>
  </g>
</svg>
