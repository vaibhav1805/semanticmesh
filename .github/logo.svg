<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#primaryGradient)" opacity="0.1"/>

  <!-- Connection lines (edges) -->
  <g stroke="url(#accentGradient)" stroke-width="2" opacity="0.6">
    <line x1="50" y1="50" x2="100" y2="100" />
    <line x1="150" y1="50" x2="100" y2="100" />
    <line x1="50" y1="150" x2="100" y2="100" />
    <line x1="150" y1="150" x2="100" y2="100" />
    <line x1="50" y1="50" x2="150" y2="50" />
    <line x1="50" y1="150" x2="150" y2="150" />
    <line x1="50" y1="50" x2="50" y2="150" />
    <line x1="150" y1="50" x2="150" y2="150" />
    <line x1="50" y1="50" x2="150" y2="150" />
    <line x1="150" y1="50" x2="50" y2="150" />
  </g>

  <!-- Outer nodes (components) -->
  <circle cx="50" cy="50" r="12" fill="url(#accentGradient)"/>
  <circle cx="150" cy="50" r="12" fill="url(#accentGradient)"/>
  <circle cx="50" cy="150" r="12" fill="url(#accentGradient)"/>
  <circle cx="150" cy="150" r="12" fill="url(#accentGradient)"/>

  <!-- Central node (emphasized) -->
  <circle cx="100" cy="100" r="18" fill="url(#primaryGradient)"/>
  <circle cx="100" cy="100" r="14" fill="white" opacity="0.9"/>
  <circle cx="100" cy="100" r="10" fill="url(#primaryGradient)"/>

  <!-- Node highlights -->
  <circle cx="50" cy="50" r="4" fill="white" opacity="0.8"/>
  <circle cx="150" cy="50" r="4" fill="white" opacity="0.8"/>
  <circle cx="50" cy="150" r="4" fill="white" opacity="0.8"/>
  <circle cx="150" cy="150" r="4" fill="white" opacity="0.8"/>
  <circle cx="100" cy="100" r="4" fill="white" opacity="0.9"/>
</svg>
